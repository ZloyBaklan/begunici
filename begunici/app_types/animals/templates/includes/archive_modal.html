<div id="archive-modal" class="modal" style="display:none;">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Перенос в архив</h5>
            </div>
            <div class="modal-body">
                <p>Выберите статус, который будет установлен для выбранных животных:</p>
                <select id="archive-status-select" class="form-select mb-3"></select>

                <label for="archive-status-date" class="form-label">Дата присвоения статуса:</label>
                <input type="date" id="archive-status-date" class="form-control" required>

                <label for="archive-carcass-weight" class="form-label mt-3">Вес туши (кг):</label>
                <input type="number" id="archive-carcass-weight" class="form-control" step="0.1" min="0" placeholder="Необязательно">

                <div id="archive-act-fields" class="border rounded p-3 mt-4" style="display: none;">
                    <div class="form-check mb-3">
                        <input type="checkbox" id="archive-act-download" class="form-check-input" checked>
                        <label for="archive-act-download" class="form-check-label">Скачать акт после переноса в архив</label>
                    </div>

                    <div id="archive-act-number-group" class="mb-3">
                        <label for="archive-act-number" class="form-label">Номер акта:</label>
                        <input type="text" id="archive-act-number" class="form-control" placeholder="Введите номер акта">
                    </div>

                    <div class="row g-3">
                        <div class="col-md-6">
                            <label for="archive-act-date" class="form-label">Дата акта:</label>
                            <input type="date" id="archive-act-date" class="form-control">
                            <div class="form-text">Можно оставить пустой.</div>
                        </div>
                        <div class="col-md-6">
                            <label for="archive-act-fatness" class="form-label">Упитанность:</label>
                            <select id="archive-act-fatness" class="form-select">
                                <option value="ср">ср</option>
                                <option value="н/ср">н/ср</option>
                                <option value="выс">выс</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label for="archive-act-diagnosis" class="form-label">Диагноз / основание:</label>
                            <textarea id="archive-act-diagnosis" class="form-control" rows="2"></textarea>
                        </div>
                        <div class="col-md-6">
                            <label for="archive-act-worker-name" class="form-label">ФИО закрепленного работника:</label>
                            <input type="text" id="archive-act-worker-name" class="form-control">
                        </div>
                    </div>

                    <div class="mt-3">
                        <h6 class="mb-2">Остальные поля автоматически заполнится в акте</h6>
                        <div id="archive-act-preview" class="table-responsive small text-muted">
                            Выберите статус и животных, чтобы увидеть данные.
                        </div>
                    </div>
                </div>

                <div id="archive-act-unavailable" class="alert alert-warning mt-3" style="display: none;">
                    Для выбранного статуса отсутствует шаблон акта.
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-primary" onclick="applyArchiveStatus()">Применить</button>
                <button class="btn btn-secondary" onclick="closeArchiveModal()">Отмена</button>
            </div>
        </div>
    </div>
</div>
