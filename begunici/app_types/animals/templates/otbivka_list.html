{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="container-fluid">
    <div class="row mb-4">
        <div class="col-12">
            <h1 class="mb-3">Список отбивки</h1>
        </div>
    </div>

    <div class="row">
        <div class="col-12">
            <div class="card">
                <div class="card-header">
                    <div class="row align-items-center">
                        <div class="col-md-6">
                            <h5 class="card-title mb-0">Животные с отбивкой</h5>
                        </div>
                        <div class="col-md-6">
                            <input type="text" id="otbivka-search" class="form-control" 
                                   placeholder="Поиск по номеру бирки...">
                        </div>
                    </div>
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-striped table-hover">
                            <thead class="table-light">
                                <tr>
                                    <th width="25%">Дата отбивки</th>
                                    <th width="35%">Бирка</th>
                                    <th width="40%">Возраст на момент отбивки</th>
                                </tr>
                            </thead>
                            <tbody id="otbivka-list">
                                <!-- Данные будут загружены через JavaScript -->
                            </tbody>
                        </table>
                    </div>
                    
                    <!-- Пагинация -->
                    <div id="pagination" class="mt-3"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
/* Дополнительные стили для страницы */
.table th {
    border-top: none;
    font-weight: 600;
}

.table td {
    vertical-align: middle;
}

/* Адаптивность для мобильных */
@media (max-width: 768px) {
    .table-responsive {
        font-size: 0.875rem;
    }
    
    .card-header .row {
        flex-direction: column;
    }
    
    .card-header .col-md-6 {
        margin-bottom: 1rem;
    }
    
    .card-header .col-md-6:last-child {
        margin-bottom: 0;
    }
}
</style>

<!-- Подключение скриптов -->
<script type="module" src="{% static 'js/otbivka.js' %}"></script>

{% endblock %}
