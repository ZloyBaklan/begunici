{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="container-fluid">
    <div class="row mb-4">
        <div class="col-12">
            <h1 class="mb-3">Список отбивки</h1>
        </div>
    </div>

    <div class="row">
        <!-- Левая колонка - Ковровая отбивка -->
        <div class="col-lg-4 mb-4">
            <div class="card">
                <div class="card-header">
                    <h5 class="card-title mb-0">Ковровая отбивка</h5>
                </div>
                <div class="card-body">
                    <form id="bulk-otbivka-form">
                        <div class="mb-3">
                            <label for="otbivka-date" class="form-label">Дата отбивки</label>
                            <input type="date" class="form-control" id="otbivka-date" required>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Выбор животных</label>
                            <button type="button" class="btn btn-outline-primary w-100" onclick="showSelectAnimalsModal()">
                                Выбрать животных
                            </button>
                            <div id="selected-animals-display" class="mt-2 text-muted">
                                Не выбрано
                            </div>
                        </div>
                        
                        <button type="button" class="btn btn-success w-100" onclick="performBulkOtbivka()" id="bulk-otbivka-btn" disabled>
                            Выполнить отбивку
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <!-- Правая колонка - Список отбивки -->
        <div class="col-lg-8 mb-4">
            <div class="card">
                <div class="card-header">
                    <h5 class="card-title mb-0">Животные с отбивкой</h5>
                    <!-- Фильтр по диапазону дат -->
                    <div class="row mt-3">
                        <div class="col-md-3">
                            <label for="otbivka-date-from" class="form-label">Дата отбивки с:</label>
                            <input type="date" id="otbivka-date-from" class="form-control">
                        </div>
                        <div class="col-md-3">
                            <label for="otbivka-date-to" class="form-label">Дата отбивки по:</label>
                            <input type="date" id="otbivka-date-to" class="form-control">
                        </div>
                        <div class="col-md-3">
                            <label for="otbivka-search" class="form-label">Поиск по бирке:</label>
                            <input type="text" id="otbivka-search" class="form-control" 
                                   placeholder="Введите номер бирки...">
                        </div>
                        <div class="col-md-2 d-flex align-items-end">
                            <button type="button" class="btn btn-primary w-100" onclick="performOtbivkaSearch()">
                                Применить
                            </button>
                        </div>
                        <div class="col-md-2 d-flex align-items-end">
                            <button type="button" class="btn btn-success w-100" onclick="exportOtbivkaToExcel()">
                                Экспорт
                            </button>
                        </div>
                    </div>
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-striped table-hover">
                            <thead class="table-light">
                                <tr>
                                    <th width="25%">Дата отбивки</th>
                                    <th width="35%">Бирка</th>
                                    <th width="40%">Возраст на момент отбивки</th>
                                </tr>
                            </thead>
                            <tbody id="otbivka-list">
                                <!-- Данные будут загружены через JavaScript -->
                            </tbody>
                        </table>
                    </div>
                    
                    <!-- Пагинация -->
                    <div id="pagination" class="mt-3"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Модальное окно выбора животных -->
<div class="modal fade" id="selectAnimalsModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Выбор животных для отбивки</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3">
                    <div class="input-group">
                        <input type="text" class="form-control" id="animalsSearch" placeholder="Введите номер бирки для поиска...">
                        <button class="btn btn-primary" type="button" id="searchAnimalsBtn">Поиск</button>
                    </div>
                </div>
                <div id="animals-list" style="max-height: 400px; overflow-y: auto;">
                    <div class="text-muted text-center py-3">
                        Введите номер бирки и нажмите "Поиск" для отображения результатов
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                <button type="button" class="btn btn-primary" onclick="confirmAnimalsSelection()">Выбрать</button>
            </div>
        </div>
    </div>
</div>

<style>
/* Дополнительные стили для страницы */
.table th {
    border-top: none;
    font-weight: 600;
}

.table td {
    vertical-align: middle;
}

/* Адаптивность для мобильных */
@media (max-width: 768px) {
    .col-lg-4, .col-lg-8 {
        margin-bottom: 1rem;
    }
    
    .table-responsive {
        font-size: 0.875rem;
    }
    
    .card-header .row {
        flex-direction: column;
    }
    
    .card-header .col-md-6 {
        margin-bottom: 1rem;
    }
    
    .card-header .col-md-6:last-child {
        margin-bottom: 0;
    }
}
</style>

<!-- Подключение скриптов -->
<script type="module" src="{% static 'js/otbivka.js' %}"></script>

{% endblock %}
