{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {% include "partials/favicons.html" %}
    <title>Вход во внутреннюю часть</title>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(120deg, #f8f9fa, #e9ecef);
            padding: 1rem;
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            background: #fff;
            border-radius: 14px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            padding: 2rem;
        }

        .logo {
            width: 72px;
            height: 72px;
            object-fit: contain;
            display: block;
            margin: 0 auto 1rem;
        }

        .title {
            text-align: center;
            font-weight: 700;
            margin-bottom: 1.25rem;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <img class="logo" src="{% static 'img/logo.png' %}" alt="Logo">
        <h1 class="h4 title">Вход во внутреннюю часть</h1>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-danger py-2" role="alert">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="post" action="/login/">
            {% csrf_token %}
            <input type="hidden" name="next" value="{{ next|default:'/' }}">

            <div class="mb-3">
                <label for="username" class="form-label">Логин</label>
                <input id="username" name="username" class="form-control" required autofocus>
            </div>

            <div class="mb-4">
                <label for="password" class="form-label">Пароль</label>
                <input id="password" name="password" type="password" class="form-control" required>
            </div>

            <button type="submit" class="btn btn-dark w-100">Войти</button>
        </form>
    </div>
</body>
</html>
